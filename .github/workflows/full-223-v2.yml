name: Full 223 V2 Regression

# New 223-case dataset (test_all_223_v2) — separate from the original full-223.
# Same cost profile (~$50, 1-3 hrs), so it is never default-on. Triggers:
#   - PR label `full-regression-v2`  (label-add only, single shot per add)
#   - manual workflow_dispatch       (with model selector)
# To re-run on a PR after new commits, remove and re-add the label.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to evaluate'
        required: false
        default: 'deepseek-v4-pro'
        type: choice
        options:
          - deepseek-v4-pro

concurrency:
  # Serialize v2 runs — same reasoning as full-223.
  group: full-223-v2
  cancel-in-progress: false

jobs:
  full-223-v2:
    name: Full 223 V2 (${{ inputs.model || 'deepseek-v4-pro' }})
    if: github.event_name != 'pull_request' || github.event.label.name == 'full-regression-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PAWLY_MODEL: ${{ inputs.model || 'deepseek-v4-pro' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      DEEPEVAL_TELEMETRY_OPT_OUT: '1'
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full-223-v2 regression
        run: |
          # -n 8: 8 parallel xdist workers. loadgroup keeps tests marked with
          # pytest.mark.xdist_group (longitudinal cases, see conftest.py) on
          # the same worker so per-pet ordering is preserved.
          python -m pytest tests/blackbox_multiturn/test_message_handler_multiturn.py \
            --multiturn-topic=multiturn_pawly_regression_test_all_223_v2 \
            --model="$PAWLY_MODEL" \
            --compliance-model=gemini-2.5-flash \
            -n 8 --dist loadgroup \
            -s -v

      - name: Annotate failure root causes
        if: always()
        run: |
          python scripts/annotate_root_causes.py \
            'tests/blackbox_multiturn/results/multiturn_pawly_regression_test_all_223_v2_report_*.json'

      - name: Upload reports as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-223-v2-reports-${{ github.run_id }}
          path: |
            tests/blackbox_multiturn/results/*.json
            tests/blackbox_multiturn/logs/*.jsonl
          retention-days: 90
          if-no-files-found: warn

      - name: Publish reports to VPS
        if: always()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_PATH" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "VPS secrets not configured — skipping upload."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          # Reports land flat in VPS_PATH; per-run filename uniqueness
          # (topic + model + timestamp) keeps v2 reports separate from full-223.
          # Logs go into logs/ subdir to stay out of the Reports glob.
          REMOTE_DIR="${VPS_PATH%/}"
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" "mkdir -p '$REMOTE_DIR' '$REMOTE_DIR/logs'"
          scp -i ~/.ssh/id_ed25519 \
            tests/blackbox_multiturn/results/*.json \
            "$VPS_USER@$VPS_HOST:$REMOTE_DIR/"
          scp -i ~/.ssh/id_ed25519 \
            tests/blackbox_multiturn/logs/*.jsonl \
            "$VPS_USER@$VPS_HOST:$REMOTE_DIR/logs/" || true
          echo "Uploaded reports to $VPS_USER@$VPS_HOST:$REMOTE_DIR"

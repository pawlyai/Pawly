# Full-223 regression — opt-in per PR via the `full-regression` label.
#
# Triggered when a maintainer adds the `full-regression` label to a PR.
# Takes 1-3 hours and ~$50 in LLM calls, so it's NOT default-on. Use
# before merging any non-trivial change to prompts / models / orchestrator.
#
# To run: open the PR, click "Labels", add `full-regression`. The workflow
# fires only on the label-add event (not on subsequent commits) so you
# don't accidentally burn $50 by pushing to a labeled PR. To re-run after
# new commits, remove and re-add the label.

name: regression-full

on:
  pull_request:
    types: [labeled]

concurrency:
  # Only one full-223 run at a time across the whole repo. Concurrent runs
  # corrupt each other's blackbox state, and we rarely need >1 in flight.
  group: regression-full
  cancel-in-progress: false

jobs:
  blackbox-multiturn-full:
    name: full-223
    if: github.event.label.name == 'full-regression'
    runs-on: [self-hosted, pawly-vps]
    timeout-minutes: 240   # 4 hours; abort if it stalls
    env:
      MODEL: deepseek-v4-pro
      REGRESSION_CACHE_DIR: /opt/pawly/regression-cache

    steps:
      - name: Check out PR commit
        uses: actions/checkout@v4

      - name: Install dependencies
        run: make install

      - name: Restore baseline from VPS cache
        run: |
          BASELINE_CACHE="$REGRESSION_CACHE_DIR/baseline-full-223.json"
          if [ -f "$BASELINE_CACHE" ]; then
            mkdir -p tests/blackbox_multiturn/results
            cp "$BASELINE_CACHE" tests/blackbox_multiturn/results/_baseline_main_full_223.json
            echo "Restored full-223 baseline from $BASELINE_CACHE"
          else
            echo "No cached full-223 baseline yet — diff step will emit 'first run' summary."
          fi

      - name: Comment "started" on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: regression-full
          message: |
            ⏳ **Full-223 regression started.** ETA 1–3 hours.
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Run full-223 regression
        env:
          # API keys come from /opt/pawly/.env on the VPS-hosted runner.
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          TELEGRAM_BOT_TOKEN: ci-test-token
        run: |
          if [ ! -f /opt/pawly/.env ]; then
            echo "FATAL: /opt/pawly/.env not found. This workflow requires the"
            echo "       VPS-hosted runner (see docs/self-hosted-runner-setup.md)."
            exit 1
          fi
          set -a; . /opt/pawly/.env; set +a
          : "${DEEPSEEK_API_KEY:?missing in /opt/pawly/.env}"
          : "${GOOGLE_API_KEY:?missing in /opt/pawly/.env}"
          make regression-full

      - name: Locate latest report
        id: report
        run: |
          REPORT=$(ls -1t tests/blackbox_multiturn/results/multiturn_pawly_regression_report_*.json | grep -v light_30 | head -1)
          echo "path=$REPORT" >> "$GITHUB_OUTPUT"
          echo "Latest report: $REPORT"

      - name: Compare against main baseline (full)
        run: |
          BASELINE=tests/blackbox_multiturn/results/_baseline_main_full_223.json
          if [ -f "$BASELINE" ]; then
            python tests/blackbox_multiturn/utils/regression_diff.py \
              "$BASELINE" \
              "${{ steps.report.outputs.path }}" \
              --out regression-full-summary.md
          else
            echo "## Full-223 regression — first run (no baseline yet)" > regression-full-summary.md
            echo "" >> regression-full-summary.md
            python -c "
            import json
            d = json.load(open('${{ steps.report.outputs.path }}'))
            s = d['summary']
            total = s['total_cases']; pas = s['passed_threshold']
            print(f'**{pas}/{total} passed** ({100*pas/total:.1f}%)')
            " >> regression-full-summary.md
          fi
          cat regression-full-summary.md

      - name: Comment results on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: always()
        with:
          header: regression-full
          path: regression-full-summary.md

      - name: Save report + PR metadata to tree-SHA cache
        # Mirror the light workflow's caching: keep every PR's full-223 run
        # under <cache>/reports-full-223/<MODEL>/<tree-sha>.json plus a
        # .meta.json sidecar for the History page.
        if: always() && steps.report.outputs.path != ''
        env:
          TOPIC: multiturn_pawly_regression
          TREE_SHA: ""  # filled below
          COMMIT_SHA: ${{ github.sha }}
          TRIGGER: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TREE=$(git rev-parse HEAD^{tree})
          export TREE_SHA="$TREE"
          DEST="$REGRESSION_CACHE_DIR/reports-full-223/$MODEL"
          mkdir -p "$DEST"
          cp "${{ steps.report.outputs.path }}" "$DEST/$TREE.json"
          .venv/bin/python scripts/regression_write_meta.py "$DEST/$TREE.meta.json"
          # If the diff verdict was a clear improvement (or first run), promote
          # this report to baseline so the next full-223 PR gets compared
          # against this number rather than a stale one. Promotion is opt-in
          # for full-223 (vs auto for light-30) because each promotion freezes
          # a $50 measurement; a maintainer should review before promoting.
          # For now: only auto-promote if no baseline exists yet.
          if [ ! -f "$REGRESSION_CACHE_DIR/baseline-full-223.json" ]; then
            cp "${{ steps.report.outputs.path }}" "$REGRESSION_CACHE_DIR/baseline-full-223.json"
            echo "First full-223 ever — also seeded as baseline."
          fi
          echo "Cached:"
          echo "  $DEST/$TREE.json"
          echo "  $DEST/$TREE.meta.json"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-full-report
          path: |
            tests/blackbox_multiturn/results/multiturn_pawly_regression_report_*.json
            regression-full-summary.md
          retention-days: 90

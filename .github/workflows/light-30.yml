name: Light 30 Regression

on:
  push:
    branches:
      - 'feature/**'
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to evaluate'
        required: false
        default: 'deepseek-v4-pro'
        type: choice
        options:
          - deepseek-v4-pro

concurrency:
  group: light-30-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  light-30:
    name: Light 30 (${{ inputs.model || 'deepseek-v4-pro' }})
    # On PRs only run when the PR carries `lite-regression`; on push/tag/dispatch always run.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'lite-regression')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PAWLY_MODEL: ${{ inputs.model || 'deepseek-v4-pro' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      DEEPEVAL_TELEMETRY_OPT_OUT: '1'
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run light-30 regression
        run: |
          # -n 8: 8 parallel xdist workers. loadgroup keeps tests marked with
          # pytest.mark.xdist_group (longitudinal cases, see conftest.py) on
          # the same worker so per-pet ordering is preserved.
          python -m pytest tests/blackbox_multiturn/test_message_handler_multiturn.py \
            --multiturn-topic=multiturn_pawly_regression_light_30 \
            --model="$PAWLY_MODEL" \
            --compliance-model=gemini-2.5-flash \
            -n 8 --dist loadgroup \
            -s -v

      - name: Annotate failure root causes
        if: always()
        run: |
          python scripts/annotate_root_causes.py \
            'tests/blackbox_multiturn/results/multiturn_pawly_regression_light_30_report_*.json'

      - name: Upload reports as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: light-30-reports-${{ github.run_id }}
          path: |
            tests/blackbox_multiturn/results/*.json
            tests/blackbox_multiturn/logs/*.jsonl
          retention-days: 30
          if-no-files-found: warn

      - name: Publish reports to VPS
        if: always()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_PATH" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "VPS secrets not configured — skipping upload."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          # VPS_PATH is the Streamlit Reports dir (tests/blackbox_multiturn/results
          # on the VPS-checked-out repo). The Reports page globs *.json non-recursively
          # (pages/1_Reports.py), so reports go FLAT into VPS_PATH. Per-run filename
          # uniqueness (topic + model + timestamp + run-id) prevents collisions.
          # Logs are .jsonl and land in a logs/ subdir to stay out of the Reports glob.
          REMOTE_DIR="${VPS_PATH%/}"
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" "mkdir -p '$REMOTE_DIR' '$REMOTE_DIR/logs'"
          scp -i ~/.ssh/id_ed25519 \
            tests/blackbox_multiturn/results/*.json \
            "$VPS_USER@$VPS_HOST:$REMOTE_DIR/"
          # Logs may not exist on first run; don't fail the step if so.
          scp -i ~/.ssh/id_ed25519 \
            tests/blackbox_multiturn/logs/*.jsonl \
            "$VPS_USER@$VPS_HOST:$REMOTE_DIR/logs/" || true
          echo "Uploaded reports to $VPS_USER@$VPS_HOST:$REMOTE_DIR"

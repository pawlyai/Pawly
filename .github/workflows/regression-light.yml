# Light-30 regression — opt-in per PR via the `lite-regression` label.
#
# Runs on a self-hosted runner installed on the VPS so we can source
# /opt/pawly/.env directly — no API keys live in GitHub Secrets, they
# never leave the VPS. The runner setup is documented in
# docs/self-hosted-runner-setup.md.
#
# Required env file on the VPS: /opt/pawly/.env containing
#   DEEPSEEK_API_KEY, GOOGLE_API_KEY, OPENAI_API_KEY
#
# To run on a PR: open the PR, click "Labels", add `lite-regression`.
# The job will fire on label-add and re-fire on each new commit while
# the label remains. To stop re-running, remove the label.
#
# Not gated by branch protection — there's no required check, so it's
# the author's responsibility to opt in when regression matters.

name: regression-light

on:
  pull_request:
    branches: [main]
    # `labeled` lets us start the run when `lite-regression` is added to
    # an existing PR. `synchronize` re-runs it on each new commit while the
    # label is present. `opened` covers the case of opening a PR with the
    # label already attached.
    types: [opened, synchronize, reopened, labeled]
  # Refresh the cached baseline whenever main moves so that the next PR
  # diffs against fresh numbers, not against the report from a month ago.
  # Path filter here is conservative — docs-only pushes don't need a
  # baseline refresh (tree changed but code didn't, cache would miss
  # and we'd waste $2 re-running on functionally identical code).
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/blackbox_multiturn/**'
      - 'pyproject.toml'

concurrency:
  # Cancel in-flight runs on the same PR when a new commit arrives. Saves
  # both wall-clock and LLM dollars.
  group: regression-light-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  blackbox-multiturn:
    name: light-30
    # Run only when the PR carries `lite-regression`. `contains(...)` checks
    # the *current* label set, which means: adding any other label to a PR
    # that already has `lite-regression` will also re-trigger this — slightly
    # wasteful but harmless given the cancel-in-progress concurrency.
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'lite-regression')
    runs-on: [self-hosted, pawly-vps]
    timeout-minutes: 45
    env:
      # Both the cache key and the Makefile use $MODEL — keep them in
      # sync by setting it once at the job level. Override in a feature
      # branch by editing this line; cache will partition automatically.
      MODEL: deepseek-v4-pro
      # Persistent cache lives outside the runner workdir so
      # `actions/checkout`'s `git clean` doesn't wipe it.
      REGRESSION_CACHE_DIR: /opt/pawly/regression-cache

    steps:
      - name: Check out PR commit
        uses: actions/checkout@v4

      - name: Install dependencies
        run: make install

      - name: Restore baseline from VPS cache
        run: |
          BASELINE_CACHE="$REGRESSION_CACHE_DIR/baseline-light-30.json"
          if [ -f "$BASELINE_CACHE" ]; then
            mkdir -p tests/blackbox_multiturn/results
            cp "$BASELINE_CACHE" tests/blackbox_multiturn/results/_baseline_main_light_30.json
            echo "Restored baseline from $BASELINE_CACHE"
          else
            echo "No cached baseline yet — diff step will emit 'first run' summary."
            echo "Seed via \`make regression-promote-baseline\` on the VPS, or wait"
            echo "for the first push-to-main to populate it."
          fi

      - name: Run light-30 regression
        env:
          # API keys come from /opt/pawly/.env (sourced below) so they
          # stay on the VPS and never get stored in GitHub.
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          TELEGRAM_BOT_TOKEN: ci-test-token
        run: |
          if [ ! -f /opt/pawly/.env ]; then
            echo "FATAL: /opt/pawly/.env not found. This workflow requires the"
            echo "       VPS-hosted runner (see docs/self-hosted-runner-setup.md)."
            exit 1
          fi
          # `set -a` auto-exports every assignment, so the keys reach pytest.
          set -a; . /opt/pawly/.env; set +a
          # Sanity-check that the keys we actually need are non-empty,
          # without echoing them.
          : "${DEEPSEEK_API_KEY:?missing in /opt/pawly/.env}"
          : "${GOOGLE_API_KEY:?missing in /opt/pawly/.env}"
          make regression-light

      - name: Locate latest report
        id: report
        run: |
          REPORT=$(ls -1t tests/blackbox_multiturn/results/multiturn_pawly_regression_light_30_report_*.json | head -1)
          echo "path=$REPORT" >> "$GITHUB_OUTPUT"
          echo "Latest report: $REPORT"

      - name: Compare against main baseline
        id: diff
        run: |
          # The runner caches the most recent main-branch report under this name.
          # First-time runs without a baseline still emit a useful summary.
          BASELINE=tests/blackbox_multiturn/results/_baseline_main_light_30.json
          if [ -f "$BASELINE" ]; then
            python scripts/regression-diff.py \
              "$BASELINE" \
              "${{ steps.report.outputs.path }}" \
              --out regression-summary.md
          else
            echo "## Light-30 regression — first run (no baseline yet)" > regression-summary.md
            echo "" >> regression-summary.md
            python -c "
            import json, sys
            d = json.load(open('${{ steps.report.outputs.path }}'))
            s = d['summary']
            total = s['total_cases']; pas = s['passed_threshold']
            print(f'**{pas}/{total} passed** ({100*pas/total:.1f}%)')
            " >> regression-summary.md
          fi
          cat regression-summary.md

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: regression-light
          path: regression-summary.md

      - name: Save report to tree-SHA cache
        # Always cache, even if the diff step complained — the report itself
        # is still a valid record of "this tree's behavior". Lets a future
        # push-to-main with the same tree (common for squash merges where
        # main hadn't moved) skip its refresh-baseline run.
        if: always() && steps.report.outputs.path != ''
        run: |
          TREE=$(git rev-parse HEAD^{tree})
          DEST="$REGRESSION_CACHE_DIR/reports-light-30/$MODEL"
          mkdir -p "$DEST"
          cp "${{ steps.report.outputs.path }}" "$DEST/$TREE.json"
          echo "Cached at $DEST/$TREE.json"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-light-report
          path: |
            tests/blackbox_multiturn/results/multiturn_pawly_regression_light_30_report_*.json
            regression-summary.md
          retention-days: 30

  # ── Baseline refresh ────────────────────────────────────────────────────
  # Run on push-to-main only, so that future PRs diff against the latest
  # main-branch numbers. Keeping this in the same workflow file avoids
  # having two workflows fight over the runner.
  #
  # Cache strategy: every PR's light-30 run caches its report keyed by
  # `git rev-parse HEAD^{tree}`. When main moves, this job checks if the
  # merge commit's tree matches a cached report — if so, just promote it
  # to baseline (free, instant). If not (cache miss, e.g. main moved
  # between PR open and merge so the squash produced a new tree), run
  # a fresh light-30. For a single-dev project where main usually
  # doesn't move between PR open and merge, cache hits are the norm.
  refresh-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, pawly-vps]
    timeout-minutes: 45
    env:
      MODEL: deepseek-v4-pro
      REGRESSION_CACHE_DIR: /opt/pawly/regression-cache

    steps:
      - uses: actions/checkout@v4

      - name: Check tree-SHA cache
        id: cache
        run: |
          TREE=$(git rev-parse HEAD^{tree})
          CACHED="$REGRESSION_CACHE_DIR/reports-light-30/$MODEL/$TREE.json"
          BASELINE="$REGRESSION_CACHE_DIR/baseline-light-30.json"
          echo "tree=$TREE" >> "$GITHUB_OUTPUT"
          if [ -f "$CACHED" ]; then
            echo "Cache HIT for tree $TREE — promoting cached report to baseline."
            echo "(saved ~20min wall-clock + ~\$2 LLM spend)"
            cp "$CACHED" "$BASELINE"
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "Cache MISS for tree $TREE — running full light-30."
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.cache.outputs.hit == 'false'
        run: make install

      - name: Run light-30 (cache miss path)
        if: steps.cache.outputs.hit == 'false'
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          TELEGRAM_BOT_TOKEN: ci-test-token
        run: |
          set -a; . /opt/pawly/.env; set +a
          : "${DEEPSEEK_API_KEY:?missing in /opt/pawly/.env}"
          : "${GOOGLE_API_KEY:?missing in /opt/pawly/.env}"
          make regression-light

      - name: Save as baseline + tree-SHA cache (cache miss path)
        if: steps.cache.outputs.hit == 'false'
        run: |
          REPORT=$(ls -1t tests/blackbox_multiturn/results/multiturn_pawly_regression_light_30_report_*.json | head -1)
          cp "$REPORT" "$REGRESSION_CACHE_DIR/baseline-light-30.json"
          DEST="$REGRESSION_CACHE_DIR/reports-light-30/$MODEL"
          mkdir -p "$DEST"
          cp "$REPORT" "$DEST/${{ steps.cache.outputs.tree }}.json"
          echo "Refreshed baseline: $(basename $REPORT)"

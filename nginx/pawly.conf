# Pawly nginx reverse proxy
# Place at: /etc/nginx/sites-available/pawly
# Enable with: ln -s /etc/nginx/sites-available/pawly /etc/nginx/sites-enabled/pawly
# Get certs: certbot --nginx -d api.pawly.app -d langfuse.pawly.app -d metabase.pawly.app -d reports.pawly.app

# ── api.pawly.app → Pawly bot + FastAPI (port 8000) ──────────────────────────
server {
    listen 80;
    server_name api.pawly.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.pawly.app;

    ssl_certificate     /etc/letsencrypt/live/api.pawly.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pawly.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── langfuse.pawly.app → Langfuse observability (port 3000) ──────────────────
server {
    listen 80;
    server_name langfuse.pawly.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name langfuse.pawly.app;

    ssl_certificate     /etc/letsencrypt/live/api.pawly.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pawly.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Langfuse uses SSE for realtime updates
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }
}

# ── metabase.pawly.app → Metabase dashboard (port 3001) ──────────────────────
server {
    listen 80;
    server_name metabase.pawly.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name metabase.pawly.app;

    ssl_certificate     /etc/letsencrypt/live/api.pawly.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pawly.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

# ── reports.pawly.app → Streamlit test reports UI (port 8501) ────────────────
server {
    listen 80;
    server_name reports.pawly.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name reports.pawly.app;

    ssl_certificate     /etc/letsencrypt/live/api.pawly.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pawly.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Streamlit requires WebSocket for the browser connection
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

checklist_id: CL-VOMIT-001
version: "0.1"
title_en: Vomiting
title_zh: 呕吐

species: [dog, cat]
age_groups: [any]
routing_priority: 50

trigger:
  keywords_en:
    - "vomiting"
    - "throwing up"
    - "threw up"
    - "puked"
    - "puking"
    - "retching"
    - "vomited"
  keywords_zh:
    - "呕吐"
    - "吐了"
    - "吐黄水"
    - "吐白沫"
    - "吐血"
    - "吐食物"
    - "反胃"
  false_positive_phrases:
    - "almost threw up but didn't"
    - "feeling like throwing up"     # owner, not pet
  exclude_routes:
    - CL-COUGH-001                    # cough mistaken for retching
    - CL-REGURG-001                   # passive regurgitation differs
  precedence_over:
    - CL-LETHARGY-001                 # if vomiting + lethargy, vomit checklist wins

mandatory_slots:
  - id: M1
    purpose: Distinguish upper vs lower GI involvement / bleeding / foreign body
    type: multiselect
    options:
      - undigested_food
      - partially_digested_food
      - yellow_bile
      - white_foam
      - fresh_blood
      - coffee_grounds
      - foreign_material
      - fecal_material
      - watery
    question_en: |
      What does the vomit look like — undigested food, yellow bile, white foam,
      or any blood (red or coffee-colored)?
    question_zh: |
      呕吐物看起来是什么样?未消化食物、黄水(胆汁)、白沫,还是带血?
    required: true

  - id: M2
    purpose: Acute vs chronic + dehydration risk
    type: select
    options:
      - "<1_per_day"
      - "1_to_3_per_day"
      - "3_to_5_per_day"
      - ">5_per_day"
    question_en: How many times today, and when did it start?
    question_zh: 今天吐了几次?什么时候开始的?
    required: true

  - id: M3
    purpose: Dehydration risk assessment
    type: select
    options: [normal, decreased, refusing_food, refusing_water, drinking_excess]
    question_en: How are their appetite and water intake?
    question_zh: 他的食欲和喝水怎么样?
    required: true

  - id: M4
    purpose: Systemic involvement / severity
    type: select
    options: [normal_active, slightly_tired, lethargic, very_weak, unable_to_stand]
    question_en: How is their energy level — still playful, or very lethargic?
    question_zh: 精神怎么样?还活泼吗,还是看起来很没劲?
    required: true

  - id: M5
    purpose: Concurrent GI obstruction / inflammation signal
    type: select
    options: [normal, diarrhea, no_stool_24h, bloody_stool, black_stool, scant_stool]
    question_en: Are bowel movements normal? Diarrhea or no stool?
    question_zh: 排便正常吗?有没有腹泻或者一直没拉?
    required: true

conditional_slots:
  - id: C1
    purpose: Distinguish overeating vs reflux vs gastric emptying
    type: text
    options: []
    question_en: How long after eating did they vomit?
    question_zh: 是吃完饭多久后吐的?
    required: false
    trigger_condition: "M1 contains 'undigested_food'"

  - id: C2
    purpose: Toxin / foreign body assessment
    type: text
    options: []
    question_en: What was eaten — substance, amount, when?
    question_zh: 吃了什么、量多少、什么时候吃的?
    required: false
    trigger_condition: "M1 contains 'foreign_material'"

ask_order: [M1, M2, M3, M4, M5, C1, C2]
max_turns: 5

urgency_triggers:
  - id: U1
    condition: "M1 contains 'fresh_blood' OR M1 contains 'coffee_grounds'"
    action: immediate_emergency
    triage: red
    rationale: Upper GI hemorrhage — possible ulcer, NSAID toxicity, foreign body perforation.
    skip_remaining_clarification: true
    pre_fire_keywords_en:
      - "fresh blood"
      - "bright red blood"
      - "blood in vomit"
      - "blood in the vomit"
      - "blood in his vomit"
      - "blood in her vomit"
      - "vomited blood"
      - "vomiting blood"
      - "throwing up blood"
      - "threw up blood"
      - "puking blood"
      - "coffee grounds"
      - "coffee colored"
      - "coffee-colored"
      - "dark brown vomit"
    pre_fire_keywords_zh:
      - "吐血"
      - "呕血"
      - "吐出血"
      - "咖啡色"
      - "咖啡渣"
      - "暗红色呕吐"

  - id: U2
    condition: "M1 contains 'fecal_material'"
    action: immediate_emergency
    triage: red
    rationale: Fecal vomitus suggests intestinal obstruction.
    skip_remaining_clarification: true
    pre_fire_keywords_en:
      - "fecal vomit"
      - "vomit smells like poop"
      - "vomit smells like feces"
      - "poop-smelling vomit"
      - "feces-smelling vomit"
    pre_fire_keywords_zh:
      - "粪样"
      - "吐出大便"
      - "呕吐物像大便"

  - id: U3
    condition: "M2 == '>5_per_day'"
    action: immediate_emergency
    triage: red
    rationale: Severe dehydration risk from frequency alone.
    skip_remaining_clarification: true
    pre_fire_keywords_en:
      - "vomited 6 times"
      - "vomited 7 times"
      - "vomited 8 times"
      - "vomited 10 times"
      - "throwing up nonstop"
      - "throwing up constantly"
      - "can't stop vomiting"
      - "won't stop vomiting"
    pre_fire_keywords_zh:
      - "吐了六次"
      - "吐了七次"
      - "吐了八次"
      - "吐个不停"
      - "一直在吐"
      - "停不下来"

  - id: U4
    condition: "M3 == 'refusing_water' OR M4 == 'unable_to_stand' OR M4 == 'very_weak'"
    action: immediate_emergency
    triage: red
    rationale: Severe dehydration / pre-shock signs.
    skip_remaining_clarification: true
    pre_fire_keywords_en:
      - "won't drink water"
      - "refusing water"
      - "can't stand up"
      - "cant stand up"
      - "won't stand"
      - "very weak"
      - "extremely weak"
      - "barely moves"
      - "barely moving"
    pre_fire_keywords_zh:
      - "不喝水"
      - "拒绝喝水"
      - "站不起来"
      - "非常虚弱"
      - "极度虚弱"
      - "几乎不动"

hard_limits:
  forbidden:
    - Do NOT advise inducing vomiting at home (H2O2 misdosing is fatal)
    - Do NOT give specific medication doses (including human OTC like Pepcid)
    - Do NOT name a specific disease as a diagnosis
    - Do NOT dismiss user-reported severity
  required:
    - On urgency-trigger fire, escalate immediately and skip remaining clarification
    - End with a "see vet if anything feels off" disclaimer
    - Provide clear exit criteria for any home-care suggestion (e.g. "if vomiting again within 6 hours")

advice:
  signal_recap_en: |
    Based on what you've described — vomiting that looks like {M1}, happening {M2},
    with {M3} appetite and the pet seeming {M4} — here's the picture:
  signal_recap_zh: |
    根据你描述的:呕吐物 {M1},频率 {M2},食欲 {M3},精神 {M4} —— 情况大致是这样:

  home_observation_en: |
    For now, withhold food for 6-8 hours. Then offer small amounts of water (a few
    sips every 30 minutes). If they keep that down, gradually offer a bland meal
    (small portion of plain boiled chicken or white rice). Watch closely.
  home_observation_zh: |
    建议禁食 6-8 小时,然后少量喂水(每次几口、每 30 分钟一次)。如果不再吐,可以给少量
    易消化食物(白米饭 + 水煮鸡胸肉)。密切观察。

  return_for_vet_triggers_en: |
    Please go to the vet right away if any of these happen:
    • Vomiting starts again within 6 hours
    • You see blood, coffee-colored material, or fecal-smelling vomit
    • They become lethargic, refuse water, or can't stand
    • No improvement in 24 hours
  return_for_vet_triggers_zh: |
    出现以下情况请立即就医:
    • 6 小时内再次呕吐
    • 看到血、咖啡色物质或粪样呕吐
    • 变得嗜睡、拒水、或无法站立
    • 24 小时内无改善

  disclaimer_en: |
    This is general guidance, not a diagnosis. If anything feels off, contact your vet.
  disclaimer_zh: |
    以上是一般性建议,不是诊断。如果有任何疑虑,请联系你的兽医。

escalation_template:
  en: |
    🚨 What you're describing — {fired_rationale} — needs an emergency vet now.

    On the way:
    • Don't give food or water
    • Bring a sample of the vomit if you can
    • If a toxin was ingested, bring the packaging
    • Call ahead so the ER is ready
  zh: |
    🚨 你描述的情况({fired_rationale})需要立即去急诊。

    路上:
    • 不要喂食喂水
    • 如果可以,带一份呕吐物样本
    • 如果是误食毒物,带上包装
    • 提前打电话给急诊

approval:
  status: draft
  approved_by: null
  approved_date: null
  license_number: null
  notes: |
    Draft based on Pawly Vet-Reviewed Clarification Checklist Templates v0

checklist_id: CL-OWNERMH-001
version: "0.1"
title_en: Owner Mental Health / Self-Harm Crisis
title_zh: 主人心理健康危机 / 自杀检测

species: [any]
age_groups: [any]

# Highest routing priority — preempts every medical checklist.
routing_priority: 100

trigger:
  # Note: the crisis_gate.py regex bank handles the heavy lifting before
  # routing even reaches here. This trigger list is a SECOND-LAYER catch
  # for messages that slip past the regex but match here on simpler
  # keywords. The router uses these for fallback dispatch.
  keywords_en:
    - "want to die"
    - "kill myself"
    - "end my life"
    - "no point living"
    - "nothing to live for"
    - "hurt myself"
    - "self harm"
    - "self-harm"
    - "easier way out"
    - "everyone better off without me"
    - "don't want to be here"
    - "can't go on"
  keywords_zh:
    - "想死"
    - "不想活"
    - "活不下去"
    - "结束生命"
    - "自杀"
    - "伤害自己"
    - "撑不下去"
    - "活着没意思"
    - "不想存在"
    - "想消失"
  false_positive_phrases:
    - "my friend is suicidal"
    - "article about suicide"
    - "movie about suicide"
    - "this is killing me"
    - "dying to see"
  exclude_routes: []
  precedence_over:
    # If user mentions both grief and crisis, crisis wins.
    - CL-GRIEF-001
    - CL-EUTHANASIA-001

# This checklist intentionally has NO mandatory_slots, ask_order, or advice
# template. It short-circuits to a hard-coded crisis reply (see
# crisis_gate.crisis_reply). Slots and clarification loop are
# inappropriate for crisis response — never ask "what's wrong with your pet"
# to someone reporting suicidal ideation.

mandatory_slots: []
conditional_slots: []
ask_order: []

urgency_triggers:
  - id: U1
    condition: "*"
    action: immediate_emergency
    triage: green
    rationale: Any crisis match short-circuits — never run clarification loop.
    skip_remaining_clarification: true

max_turns: 0

hard_limits:
  forbidden:
    - Do NOT redirect to pet-care topics
    - Do NOT show vet visit alert or RED FLAG ALERT formatting
    - Do NOT minimize the user's distress ("things will be okay", "think of your pet")
    - Do NOT diagnose ("you're depressed")
    - Do NOT shame or imply the user is wrong to feel this way
    - Do NOT end the conversation abruptly
  required:
    - Acknowledge what the user said directly and warmly
    - Offer locale-appropriate crisis hotline information
    - Encourage reaching out to a trusted person or professional
    - Stay engaged — do not rush to wrap up
    - On explicit method/plan, urgently encourage emergency services contact

# Section 10 advice template — UNUSED; reply comes from crisis_gate.crisis_reply.
# Kept here as schema-required scaffolding for audit purposes.
advice:
  signal_recap_en: ""
  signal_recap_zh: ""
  home_observation_en: ""
  home_observation_zh: ""
  return_for_vet_triggers_en: ""
  return_for_vet_triggers_zh: ""
  disclaimer_en: ""
  disclaimer_zh: ""

# Section 5 escalation template (unused; crisis_gate provides actual reply).
escalation_template:
  en: |
    Crisis-mode response is rendered by crisis_gate.crisis_reply().
    This file is the audit/version-control record for the scenario.
  zh: |
    危机模式回复由 crisis_gate.crisis_reply() 渲染。
    本文件是该场景的审计 / 版本记录。

approval:
  status: draft
  approved_by: null
  approved_date: null
  license_number: null
  notes: |
    PENDING: Independent review by a licensed mental-health professional in
    addition to the standard veterinary review. The vet sign-off alone is
    insufficient for this checklist because it concerns human crisis, not
    veterinary care.

checklist_id: CL-EUTHANASIA-001
version: "0.1"
title_en: Euthanasia Decision Support
title_zh: 安乐死决策支持

species: [any]
age_groups: [any]
routing_priority: 90    # very high — must beat default medical routing

trigger:
  keywords_en:
    - "euthanasia"
    - "put him down"
    - "put her down"
    - "put down"
    - "let him go"
    - "let her go"
    - "quality of life"
    - "should I put"
    - "time to say goodbye"
    - "humane euthanasia"
  keywords_zh:
    - "安乐死"
    - "让他走"
    - "让她走"
    - "放手"
    - "不忍心看他受罪"
    - "不忍心看她受罪"
    - "生活质量"
  false_positive_phrases:
    - "vet recommended against euthanasia"   # context flip
  exclude_routes: []
  precedence_over: []

# This is a DECISION SUPPORT scenario, not a medical clarification scenario.
# Mandatory slots are about the user's situation and emotional state, not
# the pet's symptoms.

mandatory_slots:
  - id: M1
    purpose: Where the user is in the decision process
    type: select
    options:
      - vet_recommended_owner_considering
      - family_discussing
      - already_decided_seeking_support
      - already_happened
    question_en: |
      I'm so sorry you're facing this. To help me be useful — where are you in
      this right now? Is your vet recommending it and you're considering, are
      you and family discussing, or have you already made the decision?
    question_zh: |
      听到这件事我真的很难过。为了让我更好地陪你 —— 你现在大概在哪个阶段?
      是兽医已经建议、你在考虑;你和家人正在讨论;还是已经决定了?
    required: true

  - id: M2
    purpose: Identify primary emotion — for register calibration
    type: select
    options: [grief, guilt, anger, hesitation, peace_with_residual_guilt]
    question_en: |
      What's the strongest feeling for you right now — sadness, guilt about
      the decision, anger at the situation, or something else?
    question_zh: |
      你现在最强烈的感受是什么 —— 悲伤、对这个决定的罪疚感、愤怒,还是别的?
    required: false        # honor user pacing; never force this question

  - id: M3
    purpose: Whether second opinion is wanted
    type: boolean
    options: ["yes", "no", "unsure"]
    question_en: Would another vet's perspective — a specialist or a hospice vet — help?
    question_zh: 你想听听另一位兽医的意见吗?(比如专科兽医或临终关怀兽医)
    required: false

conditional_slots: []
ask_order: [M1]            # only M1 is essential; others are offered, not pushed
max_turns: 3

# This scenario does NOT have urgency triggers — there is no emergency
# escalation path. The exception is when an OWNERMH crisis signal appears
# during the conversation, which is handled at the orchestrator level by
# re-running crisis_gate on each user turn (not here).
urgency_triggers: []

hard_limits:
  forbidden:
    - Do NOT endorse euthanasia ("yes, that's the right call")
    - Do NOT challenge the vet's recommendation
    - Do NOT trigger RED FLAG ALERT or vet-visit-alert formatting
    - Do NOT give a specific disease prognosis
    - Do NOT redirect to "what symptoms is your pet showing"
    - Do NOT push timing in either direction (no "you have time" or "don't wait")
    - Do NOT minimize ("at least…", "they're in a better place", "you can get another")
  required:
    - Acknowledge that this is one of the hardest decisions a pet owner faces
    - Offer the HHHHHMM Quality of Life scale (Dr. Alice Villalobos) as an objective tool
    - Suggest a second opinion from a specialist or hospice vet when appropriate
    - "Frame the decision as the owner's choice: this is theirs and their family's"
    - Affirm — gently — that whatever they choose comes from love
    - Stay engaged at the user's pace; do not rush to wrap up

advice:
  signal_recap_en: |
    Thank you for trusting me with this. There's no formula that makes the
    decision easier — but there are tools that can help you think through it.
  signal_recap_zh: |
    谢谢你愿意和我聊这件事。没有什么"公式"能让这个决定变得容易,但有一些工具可以帮你
    梳理思路。

  home_observation_en: |
    The HHHHHMM Quality of Life Scale (developed by Dr. Alice Villalobos, an
    oncologist who specializes in pet hospice care) is a structured way to
    look at your pet's day-to-day quality of life across seven dimensions:
    Hurt, Hunger, Hydration, Hygiene, Happiness, Mobility, and More-good-days-
    than-bad. Many vets use it as a starting point for these conversations.

    If you'd like a second perspective, hospice veterinarians (sometimes
    called veterinary palliative care providers) specialize in exactly this
    moment. They can review your pet's case fresh, sometimes in your home.
    The IAAHPC directory at iaahpc.org lists them by region.
  home_observation_zh: |
    HHHHHMM 生活质量量表(由肿瘤兽医、临终关怀专科 Dr. Alice Villalobos 创立)是一个
    帮你客观评估宠物生活质量的工具。它从 7 个维度看:疼痛(Hurt)、食欲(Hunger)、
    水分(Hydration)、卫生(Hygiene)、快乐(Happiness)、行动力(Mobility),以及
    好日子是否多于坏日子。很多兽医会用它作为讨论的起点。

    如果你想听第二意见,临终关怀专科兽医(有时叫宠物姑息治疗医生)就专门处理这种时刻 ——
    他们可以重新评估、有时甚至上门服务。IAAHPC(iaahpc.org)上有按地区的名录。

  return_for_vet_triggers_en: ""    # intentionally blank — no escalation logic
  return_for_vet_triggers_zh: ""

  disclaimer_en: |
    Whatever you decide — to act now, to wait, to seek another opinion — comes
    from your love for them. That is what this is about, in the end.
  disclaimer_zh: |
    无论你最终的选择是什么 —— 立刻行动、等等看、还是问问别的兽医 —— 都是因为你爱他。
    归根结底,这件事关于的就是这份爱。

# No escalation_template — this scenario has no emergency branch.
escalation_template: null

approval:
  status: draft
  approved_by: null
  approved_date: null
  license_number: null
  notes: |
    Highest-ethical-risk scenario. Sign-off requires veterinary clinical
    review AND review by a hospice/end-of-life specialist. Resource
    references (HHHHHMM scale, IAAHPC) are reproducible from public sources
    and not derived from any held-out eval data.

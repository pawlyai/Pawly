  rule_text: |
    **Toy breed puppy care — proactive hypoglycemia education (P2/P3 fix: chloe_peanut_edge):**
    - When discussing feeding, nutrition, or general care for toy breed puppies (breeds typically < 4 kg adult):
    - MUST proactively mention hypoglycemia (low blood sugar) risk — even if the owner did not ask about it
    - Feeding frequency guidance: every 3–4 hours for puppies under 4 months; never skip meals
    - Hypoglycemia warning signs: trembling, weakness, glazed/glassy eyes, wobbly gait, extreme lethargy, seizures in severe cases
    - Emergency response if hypoglycemia suspected: rub a small amount of honey or corn syrup on gums immediately, keep warm, then emergency vet visit
    - MUST NOT answer only the immediate nutrition question without raising this breed-specific risk
    - This applies to any toy/miniature breed puppy regardless of what the owner asked about

    - MAY suggest contacting SPCA Singapore (6287 9355) or Action for Singapore Dogs (ASD) for responsible rehoming guidance
    - MAY suggest trusted local rehoming communities with thorough adoption screening (interview, home visit, trial period)
    - MUST NOT recommend euthanasia for financial or lifestyle reasons


  rule_text: |
    **Pet medication dosage / unofficial-source requests — fixes regression P0 #3:**
    - MUST NOT give specific mg/kg or specific volume/tablet counts, even if user insists
    - MUST NOT calculate dose from weight, even if user provides weight
    - MUST NOT validate that an unofficial-source product (Shopee, Lazada, eBay, etc.) is equivalent to a vet-prescribed one
    - When declining, keep it under 30 words. Do NOT explain pharmacology, weight calculations, kidney/liver function reasoning, or toxicology — those count as "technical details of refusal" and fail compliance rubrics
    - Acceptable refusal shape: brief decline + "your vet needs to set this" + (one-sentence empathy if cost was mentioned)
    - MAY note that dose precision matters; MUST NOT walk through *why* it matters
    - For OTC products marketed for pets (e.g., flea preventives), MAY confirm package directions but redirect specific changes to vet


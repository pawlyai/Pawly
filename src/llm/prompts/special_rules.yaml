    - 安宁
    - 放手
    - 让它走
    - 走了算了
    - 生命质量
    - 生活质量
  rule_text: |
    **Euthanasia discussions — fixes regression P0 #3:**
    - Stance: Pawly supports the owner's process, does not advocate for or against
    - MUST NOT say "you should consider euthanasia" — never recommend it
    - MUST NOT say "don't give up" or anything that pressures owner to continue treatment
    - MUST validate that this is one of the hardest decisions an owner can make
    - MAY share: HHHHHMM Quality of Life scale (Hurt/Hunger/Hydration/Hygiene/Happiness/Mobility/More-good-than-bad), and that vets can help assess
    - For grief after loss: acknowledge → space for feelings → no fix-it advice unless asked
    - Stable position across rounds. If user pushes for opinion, repeat: "I can help you think through it, but the call is yours and your vet's."

    **For grief / guilt after euthanasia or pet death (P1 fix: margaret_teddy, rachel_mittens):**
    - Acknowledge the depth of the bond — do NOT minimise ("just a cat", "at least they're not suffering")
    - Validate that guilt and grief after euthanasia are normal, not a sign they made the wrong choice
    - MUST offer bereavement support resources:
      - Many vet clinics offer referrals to pet loss counselors — the owner can ask their vet
      - SPCA Singapore has a pet loss support line: 6287 9338
      - General: the Association for Pet Loss and Bereavement (aplb.org) has online resources
    - Check in on the owner's own wellbeing: "How are you holding up?"
    - MUST NOT rush to next steps or practical topics until the owner signals readiness

- id: toxin_ingestion
  # triggers_en is deliberately empty — at runtime, retrievers.py substitutes
  # TOXIN_TRIGGER_KEYWORDS from rules_engine.py as the single source of truth.
  triggers_en: []
  triggers_cn:
    - 误食
    - 吃了
    - 巧克力
    - 葡萄
    - 百合
    - 木糖醇
    - 中毒
    - 毒
  uses_rules_engine_keywords: true
  rule_text: |
    **Suspected toxin ingestion:**
    - Always 🔴 Urgent regardless of amount when:
      - Xylitol (any amount)
      - Lily (cat, any part of plant)
      - Antifreeze
      - Human medications: ibuprofen, acetaminophen, ADHD stimulants, antidepressants
      - Grapes/raisins (dog)
      - Onion/garlic concentrated form
    - Chocolate: provide ASPCA Poison Control number, calculate concern level by chocolate type + dog weight + amount, but defer specific decontamination to vet/poison control
    - Do NOT recommend inducing vomiting at home (can be dangerous; depends on substance)
    - Pawly's role: get them to act fast, not to treat

    **When owner pushes back on urgency (cost, "he looks fine", "it's been hours"):**
    - MUST NOT say "if you must wait, monitor him" or suggest home monitoring as an acceptable alternative
    - MUST maintain urgency: explain that with grape/xylitol/lily toxicity, symptoms appearing normal for hours before organ failure is common — absence of symptoms ≠ safe
    - MUST NOT adjust the vet-visit recommendation based on owner reluctance or cost concerns
    - For cost: briefly acknowledge ("I hear you on cost"), then re-state the urgency. MAY mention calling ahead to emergency vets — they sometimes offer payment plans; SPCA may have lower-cost options
    - Never reduce urgency language to "monitor and watch" for known high-risk toxins

    **Avocado — common misconception (P0 fix: harold_daisy):**
    - Avocado IS toxic to dogs. Persin causes vomiting, diarrhea, breathing difficulty, and fluid accumulation around the heart/lungs
    - MUST NOT say persin is "much less dangerous" for dogs than for birds — this minimizes a real toxicity
    - Dogs tolerate avocado flesh better than birds, but this does NOT mean it is safe or non-toxic
    - Long-term exposure + current GI symptoms (vomiting/diarrhea) → MUST recommend vet check, not "wait and see unless worsens"


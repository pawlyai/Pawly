    - hdb
    - pet dog scheme
    - approved breed
    - approved breeds
    - allowed dog
    - allowed breed
    - allowed breeds
    - dog license singapore
    - dog licence singapore
    - keep a dog in
    - register my dog
    - register or license
    - license my dog
    - licence my dog
    - sterilisation compulsory
    - sterilization compulsory
    - microchip my dog
    - microchipping requirement
  triggers_cn:
    - 组屋养狗
    - 组屋
    - 新加坡养狗
    - 准养犬
    - 狗证
  rule_text: |
    **Singapore HDB / Pet Dog Scheme questions:**
    - MUST mention "HDB Pet Dog Scheme" by name when discussing dog ownership in HDB flats
    - MUST note the core licensing requirements: sterilisation and microchipping
    - MUST NOT enumerate specific allowed/banned breeds — the official list changes; direct the owner to the AVS (Animal & Veterinary Service) source under NParks for the current list
    - MAY mention that one HDB flat allows one dog under the scheme; AVS issues the licence (not HDB directly)
    - Acceptable phrasing: "Under the HDB Pet Dog Scheme, you can keep one approved-breed dog per flat. Sterilisation and microchipping are required. For the current approved-breed list, check the AVS (NParks) website — the list is updated periodically."
    - Do NOT fabricate breed-specific weight or height limits

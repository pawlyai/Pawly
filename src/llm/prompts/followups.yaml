# Symptom followup KB — source: Pawly_急诊分诊SOP_兽医审阅版_v2.0.md
# Trigger phrases (keywords_cn / keywords_en) extracted verbatim from the
# 症状触发 column of each SOP entry. Questions adapted from 关键追问 Q1-Q5.
# Escalation hints condense the 红旗信号 column into a single actionable line.
# 75 symptom entries covering all SOP categories T01-T75.

# ── A. Toxin / Ingestion ──────────────────────────────────────────────────────

- id: ingestion
  system: toxicology
  keywords_en:
    - ate something
    - got into
    - swallowed
    - licked
    - chewed on
    - found and ate
    - counter-surfed
    - ate a plant
    - toxic food
    - can dogs eat

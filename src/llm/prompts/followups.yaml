  escalation_hint: "→ ER if: breathing difficulty or blue tongue OR linear foreign body (string/thread) visible — never pull it OR sharp bone/glass/needle/metal (keep fasted; vomiting could cause perforation) OR large object OR repeated retching + drooling + can't keep water down (esophageal obstruction) OR belly distended + persistent vomiting (intestinal obstruction sign). For smooth small objects only with no symptoms: soft wet food + pumpkin puree may aid passage; watch for vomiting, appetite loss, or belly distension over 24 h — any of these → ER."

- id: post_home_treatment_ingestion
  system: toxicology
  keywords_en:
    - I already made it vomit

  questions:
    - "SHORT-CIRCUIT: Is this a deep-chested large breed (Great Dane, Doberman, Boxer, German Shepherd, Standard Poodle, Rottweiler)? If yes + retching + distended belly — go to ER immediately without waiting for answers."
    - "How is the belly: visibly swollen, hard as a drum, or resonant when tapped?"
    - "Posture: standing and won't lie down, pacing, lying down and getting up repeatedly?"

    - "Gum color — pink, white/pale, or blue/purple?"
  escalation_hint: "→ ER IMMEDIATELY if: any deep-chested large breed + unproductive retching + distended belly. GDV is fatal within hours. No yellow/green level exists for this — all cases are red."


  questions:
    - "What specifically did they eat or lick? Be as precise as possible — product name or ingredient if known."
    - "Roughly how much? (Number of pieces, grams/ml, or portion size — even an estimate helps.)"
    - "Weight, breed, and age?"
    - "Approximately how long ago did this happen?"
    - "Any symptoms right now: vomiting, drooling more than usual, stumbling, seizure, or extremely agitated/extremely sleepy?"
    - "Can you find any leftover substance or packaging? A photo will help the vet enormously."
  escalation_hint: "→ ER if: zero-dose toxins (any amount = ER): xylitol, grapes/raisins, lily [cats], onion/garlic concentrate, antifreeze, pyrethrin flea products on cats, ibuprofen/acetaminophen/antidepressants, oleander, cycad/sago palm, slug/snail bait (metaldehyde). Thresholds: dark chocolate (>70%) >1 g/kg body weight → ER; milk chocolate >5 g/kg → ER. Salt >2 g/kg → ER (hypernatraemia/cerebral oedema). Macadamia nuts → treat as urgent. OR any symptom now regardless of amount. OR unknown ingestion + pet already showing signs. SG 24h ER: Mt Pleasant Mandai +65 6262-1900."


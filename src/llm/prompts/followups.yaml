    - poisonous
    - ate xylitol
    - ate chocolate
    - ate grapes
    - ate macadamia
    - macadamia nut
    - ate avocado
    - ate raw dough
    - ate yeast dough
    - ate oleander
    - ate cycad
    - sago palm
    - slug bait
    - snail bait
  keywords_cn:
    - 误食
    - 咬了
    - 舔了
    - 打翻了
    - 能不能吃
    - 它捡了
    - 偷吃了

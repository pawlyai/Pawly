  escalation_hint: "→ ER if: any dose of acetaminophen/paracetamol (cats: 1 tablet lethal — Heinz body anaemia + liver failure), antidepressants, ADHD meds, vitamin D3/cholecalciferol (latency 24–72 h; hypercalcaemia → renal failure), chemo drugs including topical 5-FU cream/Efudex (lethal if licked), insulin, or pyrethrin/permethrin flea product on a cat (first-aid: rinse with warm water + dish soap within 30 min, then ER) OR ibuprofen (>50 mg/kg GI symptoms; >100 mg/kg kidney failure) OR unknown drug + any symptom OR wrong flea product species mismatch."


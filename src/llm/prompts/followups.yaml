  escalation_hint: "→ ER if: induced vomiting for a corrosive substance (battery, bleach, acid/alkali) OR petroleum product (gasoline/kerosene — aspiration risk) OR used incorrect hydrogen peroxide concentration OR aspiration coughing after force-feeding liquids OR original toxin was high-risk."

# ── B. Digestive ──────────────────────────────────────────────────────────────

- id: vomiting
  system: gi
  keywords_en:
    - vomit
    - vomiting
    - threw up
    - throw up
    - throwing up
    - white foam
    - yellow bile
    - blood in vomit
    - retching
  keywords_cn:
    - 吐了
    - 吐了好几次
    - 吐黄水
    - 吐血
    - 吐白沫
    - 吐
    - 呕吐
    - 干呕
  questions:
    - "How many times in the last few hours, and over what time period?"
    - "What did it look like — undigested food, yellow-green bile, white foam, blood or coffee-grounds, or a foreign object?"
    - "Any of these too: diarrhea, not eating, lethargic, unproductive retching (heaving with nothing coming up), or a visibly bloated belly?"
    - "In the past 24 h, did they get into anything — garbage, new food, medication, chemicals, or plants?"
    - "Weight, age, and breed? And gum color — pink, white/pale, blue/purple, or yellow?"
  escalation_hint: "→ ER if: blood/coffee-grounds in vomit OR unproductive retching + bloated belly (GDV) OR 3+ episodes/2 h OR gums pale/purple/yellow OR any pet under 6 months + lethargy OR senior/chronically ill pet (especially diabetic) + vomiting + not eating OR suspected ingestion."

